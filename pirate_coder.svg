<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4a01730"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="320" fill="url(#bg2)" rx="16"/>
  <rect width="400" height="320" fill="url(#glow2)" rx="16"/>

  <!-- Stars twinkling -->
  <circle cx="50" cy="30" r="2" fill="#fff"><animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="20" r="2" fill="#fff"><animate attributeName="opacity" values="1;0;1" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="50" r="1.5" fill="#fff"><animate attributeName="opacity" values="1;0;1" dur="1.8s" begin="0.7s" repeatCount="indefinite"/></circle>
  <circle cx="20" cy="60" r="1.5" fill="#fff"><animate attributeName="opacity" values="1;0;1" dur="1.3s" begin="0.2s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="35" r="1.5" fill="#d4a017"><animate attributeName="opacity" values="1;0;1" dur="2.2s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="80" cy="55" r="1" fill="#d4a017"><animate attributeName="opacity" values="1;0;1" dur="1.6s" begin="0.9s" repeatCount="indefinite"/></circle>

  <!-- Floating gold coins -->
  <g>
    <circle cx="60" cy="90" r="9" fill="#d4a017">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-14;0,0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="94" font-size="9" fill="#1a0d00" font-weight="bold">
      ₿
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-14;0,0" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  <g>
    <circle cx="340" cy="75" r="9" fill="#d4a017">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="335" y="79" font-size="9" fill="#1a0d00" font-weight="bold">
      $
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Desk -->
  <rect x="55" y="240" width="290" height="14" fill="#4a2e00" rx="5"/>
  <rect x="75" y="254" width="14" height="44" fill="#3a2400" rx="3"/>
  <rect x="311" y="254" width="14" height="44" fill="#3a2400" rx="3"/>

  <!-- Laptop base -->
  <rect x="98" y="205" width="204" height="38" fill="#2a1a00" rx="7"/>
  <rect x="108" y="212" width="184" height="22" fill="#1a0d00" rx="3"/>
  <rect x="172" y="228" width="56" height="9" fill="#3a2400" rx="4"/>

  <!-- Laptop screen -->
  <rect x="102" y="108" width="196" height="100" fill="#1a1a2e" rx="8" stroke="#d4a017" stroke-width="2"/>
  <rect x="108" y="114" width="184" height="88" fill="#0d1117" rx="5"/>

  <!-- Code on screen -->
  <g font-family="monospace" font-size="7.5">
    <text x="116" y="132" fill="#d4a017">def sail_the_seas():</text>
    <text x="116" y="146" fill="#58a6ff">    model = AIAgent(</text>
    <text x="116" y="158" fill="#7ee787">        "gpt-4o")</text>
    <text x="116" y="170" fill="#58a6ff">    return automate(</text>
    <text x="116" y="182" fill="#d4a017">        world=True) &#x1F3F4;</text>
    <rect x="116" y="188" width="5" height="8" fill="#d4a017">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Pirate Hat -->
  <ellipse cx="200" cy="82" rx="36" ry="9" fill="#111111"/>
  <rect x="174" y="48" width="52" height="36" fill="#111111" rx="5"/>
  <!-- Skull on hat -->
  <circle cx="200" cy="62" r="8" fill="#f5f5f5"/>
  <circle cx="196" cy="60" r="2" fill="#111"/>
  <circle cx="204" cy="60" r="2" fill="#111"/>
  <path d="M195 67 Q200 71 205 67" stroke="#111" stroke-width="1.5" fill="none"/>
  <!-- Crossbones -->
  <line x1="193" y1="72" x2="207" y2="76" stroke="#f5f5f5" stroke-width="1.2"/>
  <line x1="207" y1="72" x2="193" y2="76" stroke="#f5f5f5" stroke-width="1.2"/>
  <!-- Hat gold stripe -->
  <rect x="174" y="76" width="52" height="5" fill="#d4a017" opacity="0.7"/>

  <!-- Head -->
  <circle cx="200" cy="100" r="22" fill="#c8956e"/>
  <!-- Eye patch (left) -->
  <ellipse cx="193" cy="97" rx="7" ry="5" fill="#111"/>
  <line x1="186" y1="95" x2="200" y2="94" stroke="#111" stroke-width="2"/>
  <!-- Right eye -->
  <circle cx="209" cy="97" r="3.5" fill="#3b1a00"/>
  <circle cx="209" cy="97" r="2" fill="#fff"/>
  <circle cx="210" cy="96" r="0.8" fill="#111"/>
  <!-- Smile / smirk -->
  <path d="M194 108 Q202 114 210 108" stroke="#5a2e00" stroke-width="1.8" fill="none"/>
  <!-- Stubble dots -->
  <circle cx="196" cy="112" r="1" fill="#a06040" opacity="0.5"/>
  <circle cx="202" cy="113" r="1" fill="#a06040" opacity="0.5"/>
  <circle cx="207" cy="112" r="1" fill="#a06040" opacity="0.5"/>

  <!-- Bandana knot -->
  <circle cx="219" cy="94" r="4" fill="#8b0000"/>

  <!-- Body -->
  <rect x="172" y="120" width="56" height="56" fill="#8b0000" rx="7"/>
  <!-- Shirt detail -->
  <line x1="200" y1="122" x2="200" y2="170" stroke="#6b0000" stroke-width="1"/>
  <circle cx="200" cy="128" r="2" fill="#d4a017"/>
  <circle cx="200" cy="138" r="2" fill="#d4a017"/>
  <!-- Belt -->
  <rect x="172" y="162" width="56" height="9" fill="#4a2e00"/>
  <rect x="194" y="163" width="12" height="7" fill="#d4a017" rx="2"/>

  <!-- Shoulders -->
  <circle cx="169" cy="126" r="12" fill="#8b0000"/>
  <circle cx="231" cy="126" r="12" fill="#8b0000"/>

  <!-- Left arm animated typing -->
  <g>
    <rect x="144" y="124" width="12" height="38" fill="#c8956e" rx="6">
      <animateTransform attributeName="transform" type="rotate" values="0 150 140;-10 150 140;0 150 140" dur="0.35s" repeatCount="indefinite"/>
    </rect>
    <circle cx="150" cy="165" r="8" fill="#c8956e">
      <animateTransform attributeName="transform" type="rotate" values="0 150 140;-10 150 140;0 150 140" dur="0.35s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right arm animated typing -->
  <g>
    <rect x="244" y="124" width="12" height="38" fill="#c8956e" rx="6">
      <animateTransform attributeName="transform" type="rotate" values="0 250 140;10 250 140;0 250 140" dur="0.35s" begin="0.175s" repeatCount="indefinite"/>
    </rect>
    <circle cx="250" cy="165" r="8" fill="#c8956e">
      <animateTransform attributeName="transform" type="rotate" values="0 250 140;10 250 140;0 250 140" dur="0.35s" begin="0.175s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ocean waves at bottom -->
  <path d="M0 280 Q50 265 100 280 Q150 295 200 280 Q250 265 300 280 Q350 295 400 280 L400 320 L0 320Z" fill="#0a1628" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0,0;-50,0;0,0" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M0 288 Q50 278 100 288 Q150 298 200 288 Q250 278 300 288 Q350 298 400 288 L400 320 L0 320Z" fill="#0d2137" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;50,0;0,0" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
